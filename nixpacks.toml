# Nixpacks build config for Railway / Coolify deployments.
# Installs Bun, Playwright Chromium and its system libraries.

[phases.setup]
nixPkgs = [
  "bun",
  "playwright-driver",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "at-spi2-core",
  "cups",
  "dbus",
  "expat",
  "fontconfig",
  "glib",
  "freetype",
  "libdrm",
  "mesa",
  "alsa-lib",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "libxkbcommon",
  "pango",
  "cairo",
  "gdk-pixbuf",
]

[phases.install]
cmds = [
  "bun install --frozen-lockfile --production",
  "bunx playwright install chromium",
]

[phases.build]
cmds = ["bun run typecheck || true"]

[start]
cmd = "bun run src/index.ts"

[variables]
NODE_ENV = "production"
PORT = "5000"
PLAYWRIGHT_BROWSERS_PATH = "/root/.cache/ms-playwright"
